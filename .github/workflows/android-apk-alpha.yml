name: Android APK Alpha

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build alpha release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK packages
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Generate Android project
        run: pnpm --filter @codexbutler/mobile exec expo prebuild --platform android --no-install

      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Stage APK artifact
        run: |
          mkdir -p artifacts
          VERSION="${GITHUB_REF_NAME:-run-${GITHUB_RUN_NUMBER}}"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk "artifacts/codexbutler-${VERSION}-alpha.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexbutler-alpha-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Attach APK to draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="$(ls artifacts/*.apk | head -n 1)"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$APK_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$APK_PATH" \
              --draft \
              --title "CodexButler ${GITHUB_REF_NAME}" \
              --notes-file docs/releases/v0.1.0-alpha.md
          fi
